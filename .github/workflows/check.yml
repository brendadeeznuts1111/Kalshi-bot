# Same gate as tools/pre-commit.sh / bun run check
name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Typecheck + test
        run: bun run check
        env:
          RESEARCH_SKIP_RATE_PREFLIGHT: "1"
